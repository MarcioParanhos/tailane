<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu - TAILANE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .hearts-container { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
      .heart { position: absolute; font-size: 22px; opacity: .9; transform: translateY(0); animation-name: floatUp; animation-timing-function: linear; will-change: transform, opacity; }
      @keyframes floatUp { 0%{ transform: translateX(0) translateY(0);} 100%{ transform: translateX(var(--drift,0px)) translateY(-110vh);} }
      /* Mobile: smaller buttons for better fit */
      @media (max-width: 640px) {
        .max-w-md a, .max-w-md button, .max-w-md .inline-flex { padding: 0.5rem 0.8rem !important; font-size: 0.95rem !important; }
        .w-10.h-10 { width: 2rem; height: 2rem; }
        /* Make menu buttons full-width for easy taps */
        .flex.flex-col > a, .flex.flex-col > button, .max-w-md .inline-flex { width: 100%; display: block; }
        .flex.flex-col > a span.text-lg { margin-right: 6px; }
      }
      /* Respect device safe-area (notches) */
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body class="min-h-screen flex sm:items-center items-start justify-center p-4 bg-gradient-to-br from-pink-100 via-pink-200 to-pink-400">
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="w-full max-w-md text-center p-6 bg-white rounded-lg shadow z-10">
      <h1 class="text-4xl font-extrabold text-pink-600 mb-3">BEM VINDA, TAILANE</h1>
      <p class="text-gray-600 mb-4">Escolha um lugar para explorar.</p>

      <div class="flex flex-col gap-3">
        <a href="quebra-cabeca.html" class="inline-flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">
          <span class="text-lg">🧩</span>
          Quebra Cabeça
        </a>
        <a href="mensagem-especial.html" class="inline-flex items-center justify-center gap-2 px-4 py-3 bg-pink-500 text-white rounded-lg shadow hover:bg-pink-600">
          <span class="text-lg">💬</span>
          Mensagem Especial
        </a>
        <a href="musica.html" class="inline-flex items-center justify-center gap-2 px-4 py-3 bg-green-500 text-white rounded-lg shadow hover:bg-green-600">
          <span class="text-lg">🎵</span>
          Música
        </a>
      </div>

    </div>

    <script>
      // small hearts starter for menu too
      (function(){
        const container = document.getElementById('heartsContainer');
        if(!container) return;
        setInterval(()=>{
          const h=document.createElement('div'); h.className='heart'; h.textContent='❤️';
          const left=Math.random()*100, top=Math.random()*100;
          h.style.left=left+'%'; h.style.top=top+'%'; h.style.fontSize=(12+Math.random()*36)+'px';
          h.style.setProperty('--drift', ((Math.random()-0.5)*30)+'px');
          h.style.animationDuration=(4000+Math.random()*8000)+'ms';
          container.appendChild(h);
          setTimeout(()=>h.remove(),9000);
        },400);
      })();
    </script>
  </body>
</html>
