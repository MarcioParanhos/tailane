<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quebra-cabeça - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* hearts background */
      .hearts-container { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
      .heart {
        position: absolute;
        font-size: 22px;
        opacity: 0.9;
        transform: translateY(0) rotate(0deg);
        animation-name: floatUp;
        animation-timing-function: linear;
        will-change: transform, opacity;
        text-shadow: 0 1px 0 rgba(0,0,0,0.08);
      }
      @keyframes floatUp {
        0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.95; }
        25% { opacity: 0.9; }
        50% { transform: translateX(calc(var(--drift, 0px) * 0.5)) translateY(-40vh) rotate(20deg); opacity: 0.75; }
        100% { transform: translateX(var(--drift, 0px)) translateY(-110vh) rotate(40deg); opacity: 0; }
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="hearts-container" id="heartsContainer"></div>
    <div class="max-w-lg w-full relative z-10">


      <!-- Welcome screen shown on first load -->
      <div id="welcome" class="min-h-[60vh] flex items-center justify-center">
        <div class="w-full max-w-md text-center p-6 bg-white rounded-lg shadow">
          <div class="text-4xl font-extrabold text-pink-600 mb-3">BEM VINDA, TAILANE</div>
          <div class="flex justify-center gap-3 mb-6">
            <div class="w-10 h-10 bg-pink-100 rounded-full flex items-center justify-center">🌸</div>
            <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">✨</div>
            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">💖</div>
          </div>
          <button id="startBtn" class="px-6 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">Começar</button>
        </div>
      </div>

      <section id="gameSection" class="hidden bg-white rounded-lg shadow p-4">
        <!-- Buttons on top (always) -->
        <div class="flex gap-2 justify-center mb-3">
          <button id="shuffleBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">Novo Jogo</button>
          <button id="solveBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg shadow hover:bg-gray-300">Mostrar solução</button>
        </div>

        <div id="board" class="grid gap-2 touch-none">
          <!-- Tiles geradas por JS -->
        </div>
        
        <!-- moves below board on mobile and desktop -->
        <div class="text-sm text-gray-700 mt-3 text-center">
          <span id="moves">0</span> movimentos
        </div>

        <div id="winMsg" class="mt-4 hidden text-center text-green-700 font-semibold">Parabéns — você resolveu!</div>
      </section>

    </div>

    <script src="app.js"></script>
  </body>
</html>
