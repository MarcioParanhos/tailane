<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAILANE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* hearts background */
      .hearts-container { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
      .heart {
        position: absolute;
        font-size: 22px;
        opacity: 0.9;
        transform: translateY(0) rotate(0deg);
        animation-name: floatUp;
        animation-timing-function: linear;
        will-change: transform, opacity;
        text-shadow: 0 1px 0 rgba(0,0,0,0.08);
      }
      @keyframes floatUp {
        0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.95; }
        25% { opacity: 0.9; }
        50% { transform: translateX(calc(var(--drift, 0px) * 0.5)) translateY(-40vh) rotate(20deg); opacity: 0.75; }
        100% { transform: translateX(var(--drift, 0px)) translateY(-110vh) rotate(40deg); opacity: 0; }
      }
      /* ── Button bar ── */
      .btn-bar { display:flex; flex-wrap:nowrap; gap:8px; justify-content:center; align-items:stretch; }
      .theme-bar { justify-content:flex-start; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
      .theme-bar .bbtn { flex:0 0 auto; }
      /* Top hamburger menu panel */
      .menu-panel { position:absolute; top:calc(100% + 8px); right:0; display:flex; flex-direction:column; gap:8px; background:linear-gradient(180deg,#ffffff,#f8fafc); padding:10px; border-radius:12px; box-shadow:0 12px 30px rgba(2,6,23,0.12); min-width:180px; z-index:40; }
      .menu-panel.hidden { display:none !important; }
      .top-right { justify-content:flex-end; }
      @media (max-width: 480px) {
        .menu-panel { position:fixed; left:0; right:0; top:auto; bottom:0; border-radius:12px 12px 0 0; padding:12px; min-width:unset; }
        .btn-bar:not(.top-right) { justify-content:space-between; }
      }
      .bbtn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:10px 16px; border-radius:14px; font-weight:700; font-size:0.92rem; text-decoration:none; cursor:pointer; transition:transform .12s, box-shadow .12s; white-space:nowrap; border:none; }
      .bbtn:hover { transform:translateY(-2px); }
      .bbtn-menu  { background:#fff; color:#1e293b; border:1px solid #e2e8f0; box-shadow:0 2px 8px rgba(0,0,0,0.06); flex:0 0 auto; }
      .bbtn-primary { background:linear-gradient(90deg,#3b82f6,#2563eb); color:#fff; box-shadow:0 6px 18px rgba(37,99,235,0.22); flex:1 1 auto; }
      .bbtn-secondary { background:#f1f5f9; color:#1e293b; border:1px solid #e2e8f0; flex:0 0 auto; }
      .difficulty-select { position:relative; }
      .difficulty-select select { padding:8px 10px; padding-right:40px; border-radius:10px; min-width:120px; -webkit-appearance:none; appearance:none; background:#fff; }
      .difficulty-select .select-icon { position:absolute; right:10px; top:50%; transform:translateY(-50%); width:20px; height:20px; color:#64748b; pointer-events:none; }
      .difficulty-select label { display:none; }
      /* Mobile: shorten labels so all 3 fit in one row */
      @media (max-width: 500px) {
        .bbtn { padding:10px 11px; font-size:0.83rem; gap:5px; }
        .label-full { display:none; }
        .label-short { display:inline; }
      }
      /* Desktop: make theme buttons more discreet */
      @media (min-width: 501px) {
        .theme-bar .bbtn { padding:8px 10px; border-radius:10px; font-size:0.9rem; background:#f8fafc; color:#0f172a; border:1px solid #e6eef8; box-shadow:none; }
        .theme-info { display:flex; }
      }
      @media (max-width: 500px) {
        .theme-info { display:none; }
      }
      /* Ensure selected theme shows colored style in theme bar */
      .theme-bar .bbtn.bbtn-primary, .theme-bar .bbtn[aria-pressed="true"] {
        background: linear-gradient(90deg,#3b82f6,#2563eb);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 6px 18px rgba(37,99,235,0.22);
      }
      /* make theme buttons equal width */
      .theme-buttons .bbtn { flex: 1 1 0; }
      @media (max-width: 480px) {
        /* on very small screens allow buttons to wrap into two per row */
        .theme-buttons { flex-wrap:wrap; }
        .theme-buttons .bbtn { flex: 1 1 48%; }
      }
      @media (min-width: 501px) {
        .label-short { display:none; }
      }
      @media (max-width: 640px) {
        #board { gap: 3px; width: 100%; aspect-ratio: 1 / 1; margin: 0 auto; }
        .text-sm { font-size: 0.98rem; }
      }
      /* Respect device safe-area (notches) */
      body { background-color: #CAC1FE; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      /* Slight gradient for main game card to match background */
      #gameSection { background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(236,233,255,0.6)); }
      /* Hint overlay (centered, animated) */
      .hint-overlay{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(2,6,23,0.52); backdrop-filter: blur(4px); z-index:60; padding:18px; }
      .hint-overlay.hidden{ display:none !important; }
      .hint-card{ width:min(720px,92%); background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(202,193,254,0.10)); color:#0f172a; padding:18px 18px; border-radius:14px; box-shadow:0 20px 50px rgba(2,6,23,0.18); display:flex; gap:16px; align-items:flex-start; transform:translateY(8px) scale(.98); animation: popIn .36s cubic-bezier(.2,.9,.3,1) both; }
      .hint-icon{ width:56px; height:56px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; color:white; background:linear-gradient(90deg,#06b6d4,#7c3aed); box-shadow: 0 10px 30px rgba(99,102,241,0.14); flex:0 0 56px; }
      .hint-body{ flex:1 1 auto; }
      .hint-body h3{ margin:0; font-size:1.15rem; font-weight:800; color:#0f172a; }
      .hint-body p{ margin:8px 0 0; color:#475569; line-height:1.35; }
      .hint-actions{ margin-top:12px; display:flex; gap:8px; }
      .hint-actions button{ padding:8px 12px; border-radius:10px; border:none; cursor:pointer; font-weight:700; }
      .hint-actions .calm{ background:#e6f4ff; color:#0b5cff; }
      .hint-actions .solve{ background:linear-gradient(90deg,#10b981,#059669); color:#052014; }
      .hint-close{ margin-left:12px; background:transparent; border:none; font-size:18px; cursor:pointer; color:#475569; }
      @keyframes popIn{ from{ transform: translateY(8px) scale(.98); opacity:0; } to{ transform: translateY(0) scale(1); opacity:1; } }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="hearts-container" id="heartsContainer"></div>
    <div class="max-w-lg w-full relative z-10">


      <section id="gameSection" class="bg-white rounded-lg shadow p-4 overflow-hidden">
        <!-- Compact top bar: difficulty select in front of hamburger menu -->
        <div class="btn-bar mb-3 top-right">
          <!-- Discrete difficulty select placed in front of the menu -->
          <div class="difficulty-select" style="margin-right:8px; display:flex; align-items:center; position:relative;">
            <label for="difficultySelect" style="margin-right:6px;color:#64748b;font-size:0.92rem;">Dificuldade</label>
            <select id="difficultySelect" class="bbtn bbtn-secondary" aria-label="Selecionar dificuldade">
              <option value="easy">Fácil</option>
              <option value="normal">Normal</option>
              <option value="hard">Difícil</option>
            </select>
            <!-- SVG icon to signal clickability -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="select-icon" aria-hidden>
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M18.707 8.293a1 1 0 0 1 0 1.414l-6 6a1 1 0 0 1 -1.414 0l-6 -6a1 1 0 0 1 1.414 -1.414l5.293 5.293l5.293 -5.293a1 1 0 0 1 1.414 0" />
            </svg>
          </div>

          <div style="position:relative;">
            <button id="topMenuBtn" class="bbtn bbtn-menu" aria-expanded="false" aria-label="Abrir menu">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden>
                <path d="M4 6h16M4 12h16M4 18h16" />
              </svg>
              <span class="label-full"></span>
              <span class="label-short"></span>
            </button>

            <div id="topMenuPanel" class="menu-panel hidden" role="menu" aria-hidden="true">
              <a href="index.html" class="bbtn bbtn-menu" role="menuitem">Voltar ao menu</a>
              <button id="shuffleBtn" class="bbtn bbtn-primary" role="menuitem">Novo Jogo</button>
              <button id="solveBtn" class="bbtn bbtn-secondary" role="menuitem">Mostrar solução</button>
            </div>
          </div>
        </div>
        

        <!-- Theme selector (label above, buttons in the next line; buttons equal width) -->
        <div class="theme-block mb-3" aria-label="Selecionar tema do quebra-cabeça">
          <div class="theme-info" style="color:#64748b;font-size:0.92rem;margin-bottom:8px;">Escolha um tema :</div>
          <div class="theme-buttons" style="display:flex;gap:8px;">
            <button id="themeCasamento" class="bbtn bbtn-secondary" data-theme="casamento" aria-pressed="false">
              <span class="label-full">Casamento</span>
              <span class="label-short">Casar</span>
            </button>
            <button id="themeFadas" class="bbtn bbtn-secondary" data-theme="fadas" aria-pressed="false">
              <span class="label-full">Fadas</span>
              <span class="label-short">Fadas</span>
            </button>
            <button id="themePrincesa" class="bbtn bbtn-secondary" data-theme="princesa" aria-pressed="false">
              <span class="label-full">Princesa</span>
              <span class="label-short">Princesa</span>
            </button>
          </div>
        </div>

        <div id="board" class="grid gap-2 touch-none">
          <!-- Tiles geradas por JS -->
        </div>
        
        <!-- moves below board on mobile and desktop -->
        <div class="text-sm text-gray-700 mt-3 text-center">
          <span id="moves">0</span> movimentos
        </div>

        <div id="winMsg" class="mt-4 hidden text-center text-green-700 font-semibold">Parabéns — você resolveu!</div>
        <div id="hint" class="hint-overlay hidden" role="status" aria-live="polite">
          <div class="hint-card">
            <div class="hint-icon" aria-hidden>
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden>
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M4 11a1 1 0 0 1 .117 1.993l-.117 .007h-1a1 1 0 0 1 -.117 -1.993l.117 -.007h1z" />
                <path d="M12 2a1 1 0 0 1 .993 .883l.007 .117v1a1 1 0 0 1 -1.993 .117l-.007 -.117v-1a1 1 0 0 1 1 -1z" />
                <path d="M21 11a1 1 0 0 1 .117 1.993l-.117 .007h-1a1 1 0 0 1 -.117 -1.993l.117 -.007h1z" />
                <path d="M4.893 4.893a1 1 0 0 1 1.32 -.083l.094 .083l.7 .7a1 1 0 0 1 -1.32 1.497l-.094 -.083l-.7 -.7a1 1 0 0 1 0 -1.414z" />
                <path d="M17.693 4.893a1 1 0 0 1 1.497 1.32l-.083 .094l-.7 .7a1 1 0 0 1 -1.497 -1.32l.083 -.094l.7 -.7z" />
                <path d="M14 18a1 1 0 0 1 1 1a3 3 0 0 1 -6 0a1 1 0 0 1 .883 -.993l.117 -.007h4z" />
                <path d="M12 6a6 6 0 0 1 3.6 10.8a1 1 0 0 1 -.471 .192l-.129 .008h-6a1 1 0 0 1 -.6 -.2a6 6 0 0 1 3.6 -10.8z" />
              </svg>
            </div>
            <div class="hint-body">
              <h3 id="hintTitle">Tailane — dica amiga</h3>
              <p id="hintMsg">Acho que você não vai conseguir... respira um pouco e descansa kkkkkkkkkk</p>
              <div class="hint-actions">
                <button class="calm" onclick="document.getElementById('hint').classList.add('hidden')">Eu me recuso a desistir</button>
                <button class="solve" onclick="(function(){ document.getElementById('hint').classList.add('hidden'); document.getElementById('solveBtn').click(); })()">Mostrar solução</button>
              </div>
            </div>
            <button class="hint-close" onclick="document.getElementById('hint').classList.add('hidden')" aria-label="Fechar">✕</button>
          </div>
        </div>
      </section>

    </div>

    

    <script src="app.js"></script>
  </body>
</html>
