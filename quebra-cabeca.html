<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAILANE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* hearts background */
      .hearts-container { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
      .heart {
        position: absolute;
        font-size: 22px;
        opacity: 0.9;
        transform: translateY(0) rotate(0deg);
        animation-name: floatUp;
        animation-timing-function: linear;
        will-change: transform, opacity;
        text-shadow: 0 1px 0 rgba(0,0,0,0.08);
      }
      @keyframes floatUp {
        0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.95; }
        25% { opacity: 0.9; }
        50% { transform: translateX(calc(var(--drift, 0px) * 0.5)) translateY(-40vh) rotate(20deg); opacity: 0.75; }
        100% { transform: translateX(var(--drift, 0px)) translateY(-110vh) rotate(40deg); opacity: 0; }
      }
      /* Mobile: smaller top buttons for compact layout */
      @media (max-width: 640px) {
        .flex.gap-2 { flex-direction: column; gap: 8px; }
        .flex.gap-2 > a, .flex.gap-2 > button { padding: 0.7rem 0.9rem !important; font-size: 1rem !important; width: 100%; display:block; }
        #board { gap: 4px; width: min(92vw, 520px); aspect-ratio: 1 / 1; grid-template-columns: repeat(5, 1fr); margin: 0 auto; }
        /* slightly larger touch targets below */
        .text-sm { font-size: 0.98rem; }
      }
      /* Respect device safe-area (notches) */
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex sm:items-center items-start justify-center p-4">
    <div class="hearts-container" id="heartsContainer"></div>
    <div class="max-w-lg w-full relative z-10">


      <section id="gameSection" class="bg-white rounded-lg shadow p-4">
        <!-- Buttons on top (always) -->
        <div class="flex gap-2 justify-center mb-3">
          <a href="index.html" class="px-4 py-2 bg-white text-gray-800 rounded-lg shadow hover:bg-gray-50 border">← Menu</a>
          <button id="shuffleBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">Novo Jogo</button>
          <button id="solveBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg shadow hover:bg-gray-300">Mostrar solução</button>
        </div>

        <div id="board" class="grid gap-2 touch-none">
          <!-- Tiles geradas por JS -->
        </div>
        
        <!-- moves below board on mobile and desktop -->
        <div class="text-sm text-gray-700 mt-3 text-center">
          <span id="moves">0</span> movimentos
        </div>

        <div id="winMsg" class="mt-4 hidden text-center text-green-700 font-semibold">Parabéns — você resolveu!</div>
      </section>

    </div>

    

    <script src="app.js"></script>
  </body>
</html>
