<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playlist — Tocando agora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body{ margin:0; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial; background: linear-gradient(180deg,#08121a 0%,#0b1b25 50%,#082129 100%); color:#e6f0f2; min-height:100vh; padding:24px; }
      .wrap{ max-width:1200px; margin: 0 auto; display:grid; grid-template-columns: 320px 1fr; gap:28px; align-items:start; }
      .sidebar{ background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)); padding:20px; border-radius:14px; }
      .logo{ font-weight:800; color:#1db954; font-size:20px; display:flex; gap:8px; align-items:center; }
      .playlist li{ list-style:none; padding:10px 8px; border-radius:8px; display:flex; gap:10px; align-items:center; color:#b9d6cf; }
      .playlist li.active{ background: rgba(29,185,84,0.12); color:#eafff1; }
      .cover{ width:220px; height:220px; border-radius:12px; background-size:cover; background-position:center; box-shadow: 0 14px 40px rgba(0,0,0,0.6); }
      .nowplaying{ background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02)); padding:20px; border-radius:12px; }
      .title{ font-size:2rem; font-weight:900; color:#fff; }
      .artist{ color:#cfeee1; margin-top:6px; }
      .controls{ margin-top:18px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
      .btn{ background:transparent; border:1px solid rgba(255,255,255,0.12); color:#fff; padding:10px 14px; border-radius:10px; cursor:pointer; font-size:0.95rem; }
      .play{ background: linear-gradient(90deg,#1db954,#17a34b); border:none; padding:14px 20px; font-weight:900; color:#052010; border-radius:14px; box-shadow: 0 10px 28px rgba(29,185,84,0.2); font-size:1.05rem; }
      .progress{ width:100%; height:8px; background: rgba(255,255,255,0.06); border-radius:8px; overflow:hidden; margin-top:16px; }
      .progress > i{ display:block; height:100%; background: linear-gradient(90deg,#1db954,#a6f7c9); width:0%; transition: width .4s linear; }
      .time{ display:flex; justify-content:space-between; margin-top:6px; color:#9fcfbf; font-size:0.9rem; }
      .eq{ display:inline-flex; gap:3px; align-items:end; }
      .bar{ width:4px; background:#1db954; border-radius:4px; height:4px; animation: bounce 800ms linear infinite; opacity:0.9; }
      .bar:nth-child(2){ animation-delay:120ms; }
      .bar:nth-child(3){ animation-delay:240ms; }
      @keyframes bounce{ 0%{ transform:scaleY(0.4);} 50%{ transform:scaleY(1.2);} 100%{ transform:scaleY(0.4);} }
      @media (max-width:900px){ .wrap{ grid-template-columns:1fr; } .sidebar{ order:2; } .nowplaying{ order:1; } .cover{ width:120px; height:120px; } }

      /* ── splash overlay ── */
      #splash{
        position:fixed; inset:0; z-index:100;
        background: linear-gradient(135deg,#0a1628 0%,#12243a 60%,#0a2a1a 100%);
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
        cursor:pointer;
      }
      #splash .splash-note{ font-size:72px; animation: pulse 1.8s ease-in-out infinite; }
      @keyframes pulse{ 0%,100%{transform:scale(1);opacity:.9;} 50%{transform:scale(1.12);opacity:1;} }
      #splash h2{ font-size:1.6rem; font-weight:800; color:#fff; text-align:center; }
      #splash p{ color:#9fcfbf; text-align:center; font-size:1rem; }
      #splash .splash-btn{
        margin-top:8px; padding:16px 40px; border-radius:50px; font-size:1.1rem; font-weight:800;
        background: linear-gradient(90deg,#1db954,#17a34b); color:#052010; border:none; cursor:pointer;
        box-shadow: 0 8px 28px rgba(29,185,84,0.35);
        animation: glow 2s ease-in-out infinite;
      }
      @keyframes glow{ 0%,100%{ box-shadow: 0 8px 28px rgba(29,185,84,0.35);} 50%{ box-shadow: 0 8px 42px rgba(29,185,84,0.65);} }
      #splash.hide{ animation: fadeOut .4s forwards; pointer-events:none; }
      @keyframes fadeOut{ to{ opacity:0; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <aside class="sidebar">
        <div class="logo"> <span style="font-size:22px;">🎧</span> Playlist</div>
        <ul class="playlist mt-4">
          <li class="active"><span style="width:8px;height:8px;border-radius:50%;background:#1db954;display:inline-block;margin-right:8px"></span> <span id="sidebarNow">Agora tocando — "Ame"</span></li>
        </ul>
      </aside>

      <section class="nowplaying">
        <div style="display:flex;gap:18px;align-items:center;">
          <div class="cover" id="cover" style="background-image: url('foto001.jpeg')"></div>
          <div>
            <div class="title">Far Away</div>
            <div class="artist" id="artist">Nickelback</div>
            <div class="controls">
              <button class="btn" id="prev">⏮</button>
              <button class="play" id="play">▶︎</button>
              <button class="btn" id="next">⏭</button>
              <div style="margin-left:12px;color:#9fcfbf;">Tocando na playlist</div>
            </div>
            <div class="progress" id="progress"><i></i></div>
            <div class="time"><span id="current">0:00</span><span id="duration">3:35</span></div>
          </div>
        </div>

        <div style="margin-top:18px; display:flex; align-items:center; justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;color:#9fcfbf;">
            <div class="eq" aria-hidden>
              <div class="bar" style="height:8px"></div>
              <div class="bar" style="height:14px"></div>
              <div class="bar" style="height:10px"></div>
            </div>
            <div id="nowLabel">Reproduzindo — Playlist Simulada</div>
          </div>
          
        </div>
      </section>
    </div>

    <!-- Local audio player -->
    <div style="margin-top:18px; max-width:720px;">
      <audio id="audio" src="Nickelback - Far Away.mp3" preload="auto"></audio>
    </div>

    <script>
      const playBtn    = document.getElementById('play');
      const prog       = document.getElementById('progress').firstElementChild;
      const currentEl  = document.getElementById('current');
      const durationEl = document.getElementById('duration');
      const audio      = document.getElementById('audio');

      let timer = null;

      function fmt(s){ const m=Math.floor(s/60), ss=Math.floor(s%60); return m+':'+(ss<10?'0'+ss:ss); }

      audio.addEventListener('loadedmetadata', ()=>{
        durationEl.textContent = fmt(Math.floor(audio.duration));
        // set now playing label from filename (strip extension)
        try{
          const src = audio.getAttribute('src') || audio.src || '';
          const raw = decodeURIComponent(src.split('/').pop() || '').replace(/\.[^.]+$/, '');
          let artist = '';
          let title = raw;
          if(raw.includes(' - ')){
            const parts = raw.split(' - ');
            artist = parts[0].trim();
            title = parts.slice(1).join(' - ').trim();
          } else if(raw.includes('-')){
            const parts = raw.split('-');
            artist = parts[0].trim();
            title = parts.slice(1).join('-').trim();
          }
          const now = document.getElementById('nowLabel');
          if(now) now.textContent = 'Reproduzindo — ' + (title || raw || 'Faixa');
          // update sidebar playlist text (show song name)
          const sidebarNow = document.getElementById('sidebarNow');
          if(sidebarNow) sidebarNow.textContent = 'Agora tocando — ' + (title || raw || 'Faixa');
          // update the main title (song) and artist
          const titleEl = document.querySelector('.title');
          if(titleEl) titleEl.textContent = title || titleEl.textContent;
          const artistEl = document.getElementById('artist');
          if(artistEl) artistEl.textContent = artist || artistEl.textContent;
        }catch(e){}
      });

      audio.addEventListener('timeupdate', ()=>{
        const pos = Math.floor(audio.currentTime);
        const pct = (audio.duration>0) ? (pos/audio.duration)*100 : 0;
        prog.style.width = pct + '%';
        currentEl.textContent = fmt(pos);
      });

      audio.addEventListener('play', ()=>{
        playBtn.textContent = '❚❚';
        if(timer) clearInterval(timer);
        timer = setInterval(()=>{}, 1000);
      });
      audio.addEventListener('pause', ()=>{
        playBtn.textContent = '▶︎';
        if(timer) clearInterval(timer); timer=null;
      });

      playBtn.addEventListener('click', ()=>{
        if(audio.paused){ audio.play().catch(()=>{}); }
        else { audio.pause(); }
      });

      document.getElementById('prev').addEventListener('click', ()=>{ audio.currentTime = 0; });
      document.getElementById('next').addEventListener('click', ()=>{ audio.currentTime = 0; });
    </script>
  </body>
</html>
